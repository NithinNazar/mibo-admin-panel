<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Backend API - Front Desk User</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
        background: #1a1a2e;
        color: #eee;
      }
      h1 {
        color: #00d9ff;
      }
      .section {
        background: #16213e;
        padding: 20px;
        margin: 20px 0;
        border-radius: 8px;
        border: 1px solid #0f3460;
      }
      input,
      button {
        padding: 10px;
        margin: 5px 0;
        width: 100%;
        box-sizing: border-box;
        background: #0f3460;
        border: 1px solid #00d9ff;
        color: #eee;
        border-radius: 4px;
      }
      button {
        background: #00d9ff;
        color: #1a1a2e;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background: #00b8d4;
      }
      pre {
        background: #0f0f0f;
        padding: 15px;
        border-radius: 4px;
        overflow-x: auto;
        border: 1px solid #00d9ff;
      }
      .success {
        color: #00ff00;
      }
      .error {
        color: #ff4444;
      }
      .warning {
        color: #ffaa00;
      }
      .info {
        color: #00d9ff;
      }
    </style>
  </head>
  <body>
    <h1>🔍 Test Backend API - Front Desk User</h1>

    <div class="section">
      <h2>Step 1: Login</h2>
      <input type="text" id="username" placeholder="Username" value="" />
      <input type="password" id="password" placeholder="Password" value="" />
      <button onclick="testLogin()">Login</button>
      <div id="loginResult"></div>
    </div>

    <div class="section">
      <h2>Step 2: Check User Data</h2>
      <button onclick="checkUserData()">Check Current User (/auth/me)</button>
      <div id="userDataResult"></div>
    </div>

    <div class="section">
      <h2>Step 3: Verification</h2>
      <button onclick="verifyFrontDeskSetup()">Verify Front Desk Setup</button>
      <div id="verificationResult"></div>
    </div>

    <script>
      const API_BASE = "http://localhost:5000/api";
      let accessToken = "";

      async function testLogin() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const resultDiv = document.getElementById("loginResult");

        if (!username || !password) {
          resultDiv.innerHTML =
            '<p class="error">Please enter username and password</p>';
          return;
        }

        try {
          resultDiv.innerHTML = '<p class="info">Logging in...</p>';

          const response = await fetch(
            `${API_BASE}/auth/login/username-password`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ username, password }),
            },
          );

          const data = await response.json();

          if (response.ok) {
            accessToken = data.data.accessToken;
            const user = data.data.user;

            let html = '<p class="success">✅ Login successful!</p>';
            html += "<h3>User Data:</h3>";
            html += "<pre>" + JSON.stringify(user, null, 2) + "</pre>";

            // Check for assignedCentreId
            if (user.role === "FRONT_DESK") {
              if (user.assignedCentreId) {
                html +=
                  '<p class="success">✅ assignedCentreId is present: ' +
                  user.assignedCentreId +
                  "</p>";
              } else {
                html += '<p class="error">❌ assignedCentreId is MISSING!</p>';
                html +=
                  '<p class="warning">This is the problem! The backend should return assignedCentreId for FRONT_DESK users.</p>';
              }
            } else {
              html +=
                '<p class="warning">⚠️ User role is not FRONT_DESK (role: ' +
                user.role +
                ")</p>";
            }

            resultDiv.innerHTML = html;
          } else {
            resultDiv.innerHTML =
              '<p class="error">❌ Login failed: ' +
              (data.message || "Unknown error") +
              "</p>";
          }
        } catch (error) {
          resultDiv.innerHTML =
            '<p class="error">❌ Error: ' + error.message + "</p>";
        }
      }

      async function checkUserData() {
        const resultDiv = document.getElementById("userDataResult");

        if (!accessToken) {
          resultDiv.innerHTML = '<p class="error">Please login first!</p>';
          return;
        }

        try {
          resultDiv.innerHTML = '<p class="info">Fetching user data...</p>';

          const response = await fetch(`${API_BASE}/auth/me`, {
            headers: {
              Authorization: `Bearer ${accessToken}`,
            },
          });

          const data = await response.json();

          if (response.ok) {
            const user = data.data.user;

            let html = '<p class="success">✅ User data fetched!</p>';
            html += "<pre>" + JSON.stringify(user, null, 2) + "</pre>";

            // Check for assignedCentreId
            if (user.role === "FRONT_DESK") {
              if (user.assignedCentreId) {
                html +=
                  '<p class="success">✅ assignedCentreId: ' +
                  user.assignedCentreId +
                  "</p>";
              } else {
                html += '<p class="error">❌ assignedCentreId is MISSING!</p>';
              }
            }

            resultDiv.innerHTML = html;
          } else {
            resultDiv.innerHTML =
              '<p class="error">❌ Failed: ' +
              (data.message || "Unknown error") +
              "</p>";
          }
        } catch (error) {
          resultDiv.innerHTML =
            '<p class="error">❌ Error: ' + error.message + "</p>";
        }
      }

      async function verifyFrontDeskSetup() {
        const resultDiv = document.getElementById("verificationResult");

        if (!accessToken) {
          resultDiv.innerHTML = '<p class="error">Please login first!</p>';
          return;
        }

        try {
          resultDiv.innerHTML = '<p class="info">Verifying setup...</p>';

          const response = await fetch(`${API_BASE}/auth/me`, {
            headers: {
              Authorization: `Bearer ${accessToken}`,
            },
          });

          const data = await response.json();

          if (response.ok) {
            const user = data.data.user;
            let html = "<h3>Verification Results:</h3>";
            let allGood = true;

            // Check 1: Role
            if (user.role === "FRONT_DESK") {
              html += '<p class="success">✅ User role is FRONT_DESK</p>';
            } else {
              html +=
                '<p class="error">❌ User role is not FRONT_DESK (got: ' +
                user.role +
                ")</p>";
              allGood = false;
            }

            // Check 2: centreIds
            if (user.centreIds && user.centreIds.length > 0) {
              html +=
                '<p class="success">✅ centreIds is present: ' +
                JSON.stringify(user.centreIds) +
                "</p>";
            } else {
              html += '<p class="error">❌ centreIds is empty or missing</p>';
              allGood = false;
            }

            // Check 3: assignedCentreId
            if (user.assignedCentreId) {
              html +=
                '<p class="success">✅ assignedCentreId is present: ' +
                user.assignedCentreId +
                "</p>";
            } else {
              html += '<p class="error">❌ assignedCentreId is MISSING</p>';
              html +=
                '<p class="warning">⚠️ This is the main issue! Backend should return this field.</p>';
              allGood = false;
            }

            // Check 4: Match
            if (
              user.assignedCentreId &&
              user.centreIds &&
              user.centreIds.length > 0
            ) {
              if (user.assignedCentreId === user.centreIds[0]) {
                html +=
                  '<p class="success">✅ assignedCentreId matches first centreId</p>';
              } else {
                html +=
                  '<p class="warning">⚠️ assignedCentreId (' +
                  user.assignedCentreId +
                  ") does not match first centreId (" +
                  user.centreIds[0] +
                  ")</p>";
              }
            }

            if (allGood) {
              html +=
                '<h3 class="success">🎉 All checks passed! Front desk filtering should work.</h3>';
            } else {
              html +=
                '<h3 class="error">❌ Some checks failed. Please review the issues above.</h3>';
            }

            resultDiv.innerHTML = html;
          } else {
            resultDiv.innerHTML =
              '<p class="error">❌ Failed: ' +
              (data.message || "Unknown error") +
              "</p>";
          }
        } catch (error) {
          resultDiv.innerHTML =
            '<p class="error">❌ Error: ' + error.message + "</p>";
        }
      }
    </script>
  </body>
</html>
